  /api/people/{person_id}:
    get:
      operationId: retrieve_person_details
      description: Consulta a API externa para buscar dados basicos de ator ou diretor.
      summary: Retorna detalhes de uma pessoa por id
      parameters:
      - in: path
        name: person_id
        schema:
          type: string
        required: true
      tags:
      - people
      security:
      - cookieAuth: []
      - basicAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                  name:
                    type: string
                  biography:
                    type: string
                  known_for_department:
                    type: string
                  birthday:
                    type: string
                    format: date
                    nullable: true
                  place_of_birth:
                    type: string
                  profile_image:
                    type: string
                    nullable: true
                  top_works:
                    type: array
