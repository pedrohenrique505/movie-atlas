                    type: array
                    items:
                      type: object
                      properties:
                        id:
                          type: string
                        title:
                          type: string
                        release_date:
                          type: string
                          format: date
                        status:
                          type: string
                        synopsis:
                          type: string
                        poster_image:
                          type: string
                          nullable: true
                        has_trailer:
                          type: boolean
                  pagination:
                    type: object
                    properties:
                      page:
                        type: integer
                      page_size:
                        type: integer
                      has_next:
                        type: boolean
              examples:
                NowPlayingMoviesResponse:
                  value:
                    results:
                    - id: '980489'
                      title: Gran Turismo 2
                      release_date: '2026-06-24'
                      status: listed
                      synopsis: Exemplo de retorno normalizado da API externa.
                      poster_image: https://image.tmdb.org/t/p/w780/example-poster.jpg
                      has_trailer: false
                    pagination:
                      page: 1
                      page_size: 15
                      has_next: true
                  summary: Now playing movies response
          description: ''
        '503':
          description: Falha de configuracao ou integracao com a API externa.
