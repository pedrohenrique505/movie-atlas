components:
  schemas:
    Detail:
      type: object
      properties:
        detail:
          type: string
      required:
      - detail
    EmailVerification:
      type: object
      properties:
        detail:
          type: string
        user:
          $ref: '#/components/schemas/User'
      required:
      - detail
      - user
    EmailVerificationSent:
      type: object
      properties:
        detail:
          type: string
        user:
          $ref: '#/components/schemas/User'
      required:
      - detail
      - user
    Favorite:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        tmdb_id:
          type: integer
          maximum: 9223372036854775807
          minimum: -9223372036854775808
          format: int64
        media_type:
          $ref: '#/components/schemas/MediaTypeEnum'
        created_at:
          type: string
          format: date-time
          readOnly: true
      required:
      - created_at
      - id
      - media_type
      - tmdb_id
    Login:
      type: object
      properties:
        username:
          type: string
        password:
          type: string
          writeOnly: true
      required:
      - password
      - username
    MediaTypeEnum:
      enum:
      - movie
      - tv
      type: string
      description: |-
        * `movie` - Movie
        * `tv` - TV
    Register:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        username:
          type: string
          title: Usuário
          description: Obrigatório. 150 caracteres ou menos. Letras, números e @/./+/-/_
            apenas.
          pattern: ^[\w.@+-]+$
          maxLength: 150
        email:
          type: string
          format: email
          maxLength: 254
        password:
          type: string
          writeOnly: true
          minLength: 8
        is_email_verified:
          type: boolean
          readOnly: true
      required:
      - email
      - id
      - is_email_verified
      - password
      - username
    User:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        username:
          type: string
          title: Usuário
          description: Obrigatório. 150 caracteres ou menos. Letras, números e @/./+/-/_
            apenas.
          pattern: ^[\w.@+-]+$
          maxLength: 150
        email:
          type: string
          format: email
          maxLength: 254
        is_email_verified:
          type: boolean
          readOnly: true
      required:
      - email
      - id
      - is_email_verified
      - username
  securitySchemes:
    basicAuth:
      type: http
      scheme: basic
    cookieAuth:
      type: apiKey
      in: cookie
      name: sessionid
