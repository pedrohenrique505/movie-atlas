openapi: 3.0.3
info:
  title: Movie Atlas API
  version: 0.1.0
  description: Base inicial da API REST para a plataforma Movie Atlas.
paths:
  /api/health:
    get:
      operationId: health_check
      summary: Verifica se a API esta saudavel
      tags:
      - health
      security:
      - cookieAuth: []
      - basicAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: ok
                  service:
                    type: string
                    example: movie-atlas-api
              examples:
                HealthCheckResponse:
                  value:
                    status: ok
                    service: movie-atlas-api
                  summary: Health check response
          description: ''
  /api/movies/upcoming:
    get:
      operationId: list_upcoming_movies
      description: Retorna uma resposta mockada enquanto a integracao real nao foi
        implementada.
      summary: Lista proximos lancamentos
      tags:
      - movies
      security:
      - cookieAuth: []
      - basicAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                properties:
                  results:
                    type: array
                    items:
                      type: object
                      properties:
                        id:
                          type: string
                        title:
                          type: string
                        release_date:
                          type: string
                          format: date
                        status:
                          type: string
                        synopsis:
                          type: string
                        has_trailer:
                          type: boolean
              examples:
                UpcomingMoviesResponse:
                  value:
                    results:
                    - id: mock-dune-messiah
                      title: 'Dune: Messiah'
                      release_date: '2026-12-18'
                      status: upcoming
                      synopsis: Paul Atreides enfrenta as consequencias politicas
                        e espirituais de seu imperio.
                      has_trailer: false
                    - id: mock-project-hail-mary
                      title: Project Hail Mary
                      release_date: '2026-03-20'
                      status: upcoming
                      synopsis: Um professor acorda sozinho em uma missao espacial
                        para salvar a humanidade.
                      has_trailer: true
                  summary: Upcoming movies response
          description: ''
  /api/schema/:
    get:
      operationId: schema_retrieve
      description: |-
        OpenApi3 schema for this API. Format can be selected via content negotiation.

        - YAML: application/vnd.oai.openapi
        - JSON: application/vnd.oai.openapi+json
      parameters:
      - in: query
        name: format
        schema:
          type: string
          enum:
          - json
          - yaml
      - in: query
        name: lang
        schema:
          type: string
          enum:
          - af
          - ar
          - ar-dz
          - ast
          - az
          - be
          - bg
          - bn
          - br
          - bs
          - ca
          - ckb
          - cs
          - cy
          - da
          - de
          - dsb
          - el
          - en
          - en-au
          - en-gb
          - eo
          - es
          - es-ar
          - es-co
          - es-mx
          - es-ni
          - es-ve
          - et
          - eu
          - fa
          - fi
          - fr
          - fy
          - ga
          - gd
          - gl
          - he
          - hi
          - hr
          - hsb
          - ht
          - hu
          - hy
          - ia
          - id
          - ig
          - io
          - is
          - it
          - ja
          - ka
          - kab
          - kk
          - km
