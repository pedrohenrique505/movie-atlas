openapi: 3.0.3
info:
  title: Movie Atlas API
  version: 0.1.0
  description: Base inicial da API REST para a plataforma Movie Atlas.
paths:
  /api/accounts/favorites/:
    get:
      operationId: accounts_favorites_list
      summary: Lista os favoritos do usuario autenticado
      tags:
      - accounts
      security:
      - cookieAuth: []
      - basicAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Favorite'
              examples:
                FavoriteListResponse:
                  value:
                  - - id: 1
                      tmdb_id: 550
                      media_type: movie
                      created_at: '2026-03-21T22:30:00-03:00'
                  summary: Favorite list response
          description: ''
        '403':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Detail'
          description: ''
    post:
      operationId: accounts_favorites_create
      summary: Cria um favorito para o usuario autenticado
      tags:
      - accounts
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Favorite'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/Favorite'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/Favorite'
        required: true
      security:
      - cookieAuth: []
      - basicAuth: []
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Favorite'
          description: ''
        '400':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Detail'
          description: ''
        '403':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Detail'
          description: ''
  /api/accounts/favorites/{id}/:
    delete:
      operationId: accounts_favorites_delete
      summary: Remove um favorito do usuario autenticado
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        required: true
      tags:
      - accounts
      security:
      - cookieAuth: []
      - basicAuth: []
      responses:
        '204':
          description: No response body
        '403':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Detail'
          description: ''
        '404':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Detail'
          description: ''
  /api/accounts/login/:
    post:
      operationId: accounts_login
      summary: Autentica um usuario com sessao Django
      tags:
      - accounts
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Login'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/Login'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/Login'
        required: true
      security:
      - cookieAuth: []
      - basicAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
              examples:
                LoginResponse:
                  value:
                    id: 1
                    username: moviefan
                    email: moviefan@example.com
                    is_email_verified: false
                  summary: Login response
          description: ''
        '400':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Detail'
          description: ''
  /api/accounts/logout/:
    post:
      operationId: accounts_logout
      summary: Encerra a sessao do usuario autenticado
      tags:
      - accounts
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Detail'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/Detail'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/Detail'
        required: true
      security:
      - cookieAuth: []
      - basicAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Detail'
              examples:
                LogoutResponse:
                  value:
                    detail: Logout realizado com sucesso.
                  summary: Logout response
          description: ''
        '403':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Detail'
          description: ''
  /api/accounts/me/:
    get:
      operationId: accounts_me
      summary: Retorna o usuario autenticado
      tags:
      - accounts
      security:
      - cookieAuth: []
      - basicAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
          description: ''
        '403':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Detail'
          description: ''
  /api/accounts/register/:
    post:
      operationId: accounts_register
      summary: Cria uma conta de usuario
      tags:
      - accounts
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Register'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/Register'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/Register'
        required: true
      security:
      - cookieAuth: []
      - basicAuth: []
      - {}
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Register'
          description: ''
        '400':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Detail'
          description: ''
  /api/accounts/verify-email/{uidb64}/{token}/:
    get:
      operationId: accounts_verify_email_confirm
      summary: Confirma a verificacao de e-mail por link com token
      parameters:
      - in: path
        name: token
        schema:
          type: string
        required: true
      - in: path
        name: uidb64
        schema:
          type: string
        required: true
      tags:
      - accounts
      security:
      - cookieAuth: []
      - basicAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EmailVerification'
              examples:
                VerificationConfirmedResponse:
                  value:
                    detail: E-mail verificado com sucesso.
                    user:
                      id: 1
                      username: moviefan
                      email: moviefan@example.com
                      is_email_verified: true
                  summary: Verification confirmed response
          description: ''
        '400':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Detail'
          description: ''
  /api/accounts/verify-email/send/:
    post:
      operationId: accounts_verify_email_send
      summary: Envia o e-mail de verificacao para o usuario autenticado
      tags:
      - accounts
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EmailVerificationSent'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/EmailVerificationSent'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/EmailVerificationSent'
        required: true
      security:
      - cookieAuth: []
      - basicAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EmailVerificationSent'
              examples:
                VerificationEmailSentResponse:
                  value:
                    detail: E-mail de verificacao enviado com sucesso.
                    user:
                      id: 1
                      username: moviefan
                      email: moviefan@example.com
                      is_email_verified: false
                  summary: Verification email sent response
          description: ''
        '400':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Detail'
          description: ''
        '403':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Detail'
          description: ''
  /api/health:
    get:
      operationId: health_check
      summary: Verifica se a API esta saudavel
      tags:
      - health
      security:
      - cookieAuth: []
      - basicAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: ok
                  service:
                    type: string
                    example: movie-atlas-api
              examples:
                HealthCheckResponse:
                  value:
                    status: ok
                    service: movie-atlas-api
                  summary: Health check response
          description: ''
  /api/movies/{movie_id}:
    get:
      operationId: retrieve_movie_details
      description: Consulta a API externa para buscar titulo, sinopse, data, imagens
        e trailer.
      summary: Retorna detalhes de um filme por id
      parameters:
      - in: path
        name: movie_id
        schema:
          type: string
        required: true
      tags:
      - movies
      security:
      - cookieAuth: []
      - basicAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                  title:
                    type: string
                  synopsis:
                    type: string
                  release_date:
                    type: string
                    format: date
                  runtime:
                    type: integer
                    nullable: true
                  genres:
                    type: array
                    items:
                      type: string
                  status:
                    type: string
                  vote_average:
                    type: number
                    nullable: true
                  poster_image:
                    type: string
                    nullable: true
                  backdrop_image:
                    type: string
                    nullable: true
                  images:
                    type: array
                    items:
                      type: string
                  media:
                    type: object
                    properties:
                      backdrops:
                        type: array
                        items:
                          type: object
                          properties:
                            preview_image:
                              type: string
                            full_image:
                              type: string
                      posters:
                        type: array
                        items:
                          type: object
                          properties:
                            preview_image:
                              type: string
                            full_image:
                              type: string
                      videos:
                        type: array
                        items:
                          type: object
                          properties:
                            name:
                              type: string
                            type:
                              type: string
                            youtube_key:
                              type: string
                            embed_url:
                              type: string
                            thumbnail_image:
                              type: string
                  cast:
                    type: array
                    items:
                      type: object
                      properties:
                        id:
                          type: string
                        name:
                          type: string
                        character:
                          type: string
                        profile_image:
                          type: string
                          nullable: true
                  directors:
                    type: array
                    items:
                      type: object
                      properties:
                        id:
                          type: string
                        name:
                          type: string
                        department:
                          type: string
                        profile_image:
                          type: string
                          nullable: true
                  trailer:
                    type: object
                    nullable: true
                    properties:
                      name:
                        type: string
                      youtube_key:
                        type: string
                      embed_url:
                        type: string
                  watch_providers:
                    type: object
                    properties:
                      link:
                        type: string
                        nullable: true
                      categories:
                        type: array
                        items:
                          type: object
                          properties:
                            key:
                              type: string
                            label:
                              type: string
                            providers:
                              type: array
                              items:
                                type: object
                                properties:
                                  id:
                                    type: string
                                  name:
                                    type: string
                                  logo_image:
                                    type: string
                                    nullable: true
                                  link:
                                    type: string
                                    nullable: true
              examples:
                MovieDetailsResponse:
                  value:
                    id: '980489'
                    title: Gran Turismo 2
                    synopsis: Exemplo de detalhes de um filme.
                    release_date: '2026-06-24'
                    runtime: 118
                    genres:
                    - Acao
                    - Drama
                    status: Released
                    vote_average: 7.4
                    poster_image: https://image.tmdb.org/t/p/w780/example-poster.jpg
                    backdrop_image: https://image.tmdb.org/t/p/w1280/example-backdrop.jpg
                    images:
                    - https://image.tmdb.org/t/p/w780/example-image-1.jpg
                    - https://image.tmdb.org/t/p/w780/example-image-2.jpg
                    media:
                      backdrops:
                      - preview_image: https://image.tmdb.org/t/p/w1280/example-backdrop-1.jpg
                        full_image: https://image.tmdb.org/t/p/original/example-backdrop-1.jpg
                      posters:
                      - preview_image: https://image.tmdb.org/t/p/w780/example-poster-1.jpg
                        full_image: https://image.tmdb.org/t/p/original/example-poster-1.jpg
                      videos:
                      - name: Trailer oficial
                        type: Trailer
                        youtube_key: abc123
                        embed_url: https://www.youtube.com/embed/abc123
                        thumbnail_image: https://img.youtube.com/vi/abc123/hqdefault.jpg
                    cast:
                    - id: '1'
                      name: Ator Exemplo
                      character: Piloto
                      profile_image: https://image.tmdb.org/t/p/w300/example-cast.jpg
                    directors:
                    - id: '2'
                      name: Diretora Exemplo
                      department: Directing
                      profile_image: https://image.tmdb.org/t/p/w300/example-director.jpg
                    trailer:
                      name: Trailer oficial
                      youtube_key: abc123
                      embed_url: https://www.youtube.com/embed/abc123
                    watch_providers:
                      link: https://www.themoviedb.org/movie/980489/watch
                      categories:
                      - key: flatrate
                        label: Streaming
                        providers:
                        - id: '8'
                          name: Netflix
                          logo_image: https://image.tmdb.org/t/p/w300/netflix.jpg
                          link: https://www.themoviedb.org/movie/980489/watch
                  summary: Movie details response
          description: ''
        '503':
          description: Falha de configuracao ou integracao com a API externa.
  /api/movies/categories:
    get:
      operationId: list_movie_categories
      description: Consulta a API externa para buscar categorias de filmes.
      summary: Lista categorias de filmes
      tags:
      - movies
      security:
      - cookieAuth: []
      - basicAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                properties:
                  results:
                    type: array
                    items:
                      type: object
                      properties:
                        id:
                          type: string
                        name:
                          type: string
                  pagination:
                    type: object
                    properties:
                      page:
                        type: integer
                      page_size:
                        type: integer
                      has_next:
                        type: boolean
              examples:
                MovieCategoriesResponse:
                  value:
                    results:
                    - id: '28'
                      name: Acao
                    - id: '18'
                      name: Drama
                  summary: Movie categories response
          description: ''
        '503':
          description: Falha de configuracao ou integracao com a API externa.
  /api/movies/now-playing:
    get:
      operationId: list_now_playing_movies
      description: Consulta a API externa de filmes e retorna no maximo 15 resultados.
      summary: Lista filmes em cartaz
      tags:
      - movies
      security:
